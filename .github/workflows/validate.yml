name: Validate repository

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PowerShell and rendered templates
        shell: pwsh
        run: ./scripts/Validate-Repository.ps1

  bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Bash syntax
        run: |
          for file in scripts/bash/*.sh scripts/internal/*.sh cloud-init/cloud-init.tpl.sh; do
            bash -n "$file"
          done
